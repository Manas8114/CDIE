apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdie-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdie-redis
  template:
    metadata:
      labels:
        app: cdie-redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: cdie-redis
spec:
  selector:
    app: cdie-redis
  ports:
  - port: 6379
