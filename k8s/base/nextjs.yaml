apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdie-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdie-frontend
  template:
    metadata:
      labels:
        app: cdie-frontend
    spec:
      containers:
      - name: frontend
        image: cdie-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://cdie-api:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: cdie-frontend
spec:
  type: LoadBalancer
  selector:
    app: cdie-frontend
  ports:
  - port: 80
    targetPort: 3000
