name: CDIE v5 CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install ruff pytest mypy types-redis types-requests
        pip install ruff pytest mypy types-redis types-requests

    - name: Lint with Ruff
      run: ruff check cdie/

    - name: Format check with Ruff
      run: ruff format --check cdie/

    - name: Type check with mypy
      run: |
        mypy cdie/ \
          --ignore-missing-imports \
          --no-strict-optional \
          --warn-unused-ignores \
          --exclude 'cdie/api/rag\.py$'

    - name: Security Scan
      run: |
        python .agent/skills/vulnerability-scanner/scripts/security_scan.py .

    - name: Run unit tests
      run: |
        pytest tests/test_hte_estimation.py -q --tb=short

    - name: Run integration tests (fast subset)
      run: |
        pytest tests/test_api_integration.py tests/test_query_contract.py \
          -q --tb=short -x \
          -k "not test_query_no_500"
